services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skylife-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - skylife-net

  redis:
    image: redis:7-alpine
    container_name: skylife-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - skylife-net

volumes:
  redis-data:

networks:
  skylife-net:
    driver: bridge
